<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>2026 Ford Towing Selector</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial, sans-serif;
      }

      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .vehicle-card {
        transition: all 0.25s ease;
      }

      .vehicle-card:hover {
        transform: translateY(-4px);
        border-color: #3b82f6;
      }

      .excellent {
        background: rgba(34, 197, 94, 0.15);
        border: 1px solid rgba(34, 197, 94, 0.5);
      }

      .warning {
        background: rgba(245, 158, 11, 0.15);
        border: 1px solid rgba(245, 158, 11, 0.5);
      }

      .bad {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.5);
      }

      .hero {
        background-image:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.6), rgba(15, 23, 42, 1)),
          url("https://www.ford.com/cmslibs/content/dam/brand_ford/en_us/brand/trucks/f150/2026/collections/dm/26_FRD_F15_60710.tif/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg");
        background-size: cover;
        background-position: center;
      }

      .tab-active {
        background: #2563eb;
      }

      input,
      select {
        color: white;
        background: rgba(255, 255, 255, 0.05);
      }

      option {
        color: black;
      }
    </style>
  </head>

  <body>
    <!-- HERO -->
    <section class="hero min-h-[500px] flex items-center">
      <div class="max-w-7xl mx-auto px-6 py-24">
        <div class="max-w-3xl">
          <h1 class="text-5xl md:text-7xl font-black leading-tight">
            Find the Perfect
            <span class="text-blue-400">Ford Tow Vehicle</span>
          </h1>

          <p class="mt-6 text-xl text-slate-200">Compare towing capacity, payload, GCWR, axle ratios, and hitch requirements across the 2026 Ford lineup.</p>

          <div class="mt-8 flex gap-4 flex-wrap">
            <button
              onclick="scrollToConfigurator()"
              class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl font-bold text-lg">
              Start Matching My Trailer
            </button>

            <button
              onclick="scrollToExplorer()"
              class="border border-white/20 hover:bg-white/10 px-8 py-4 rounded-xl font-bold text-lg">
              Browse Models
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- CONFIGURATOR -->
    <section
      id="configurator"
      class="max-w-7xl mx-auto px-6 py-14">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- FILTER PANEL -->
        <div class="glass rounded-3xl p-6 h-fit sticky top-6">
          <h2 class="text-2xl font-bold mb-6">Trailer Selector</h2>

          <div class="space-y-5">
            <div>
              <label class="block mb-2 text-sm uppercase tracking-wide text-slate-400"> Trailer Type </label>

              <select
                id="trailerType"
                class="w-full p-3 rounded-xl">
                <option value="travel">Travel Trailer</option>
                <option value="boat">Boat</option>
                <option value="fifth">5th-Wheel</option>
                <option value="horse">Horse Trailer</option>
                <option value="toy">Toy Hauler</option>
              </select>
            </div>

            <div>
              <label class="block mb-2 text-sm uppercase tracking-wide text-slate-400"> Trailer Weight (lbs) </label>

              <input
                id="trailerWeight"
                type="number"
                value="8500"
                class="w-full p-3 rounded-xl" />
            </div>

            <div>
              <label class="block mb-2 text-sm uppercase tracking-wide text-slate-400"> Passengers + Cargo (lbs) </label>

              <input
                id="cargoWeight"
                type="number"
                value="600"
                class="w-full p-3 rounded-xl" />
            </div>

            <div>
              <label class="block mb-2 text-sm uppercase tracking-wide text-slate-400"> Terrain </label>

              <select
                id="terrain"
                class="w-full p-3 rounded-xl">
                <option value="flat">Flat</option>
                <option value="mixed">Mixed</option>
                <option value="mountain">Mountainous</option>
              </select>
            </div>

            <div>
              <label class="block mb-2 text-sm uppercase tracking-wide text-slate-400"> Fuel Preference </label>

              <select
                id="fuelFilter"
                class="w-full p-3 rounded-xl">
                <option value="all">All</option>
                <option value="gas">Gas</option>
                <option value="diesel">Diesel</option>
                <option value="hybrid">Hybrid</option>
              </select>
            </div>

            <button
              onclick="calculateTowMatch()"
              class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg mt-4">
              Find My Match
            </button>
          </div>
        </div>

        <!-- RESULTS -->
        <div class="lg:col-span-3">
          <!-- STATS -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="glass rounded-2xl p-5">
              <div class="text-slate-400 text-sm uppercase">Recommended Tongue Weight</div>

              <div
                id="tongueWeightResult"
                class="text-3xl font-black mt-2">
                850 lbs
              </div>
            </div>

            <div class="glass rounded-2xl p-5">
              <div class="text-slate-400 text-sm uppercase">Recommended King Pin Weight</div>

              <div
                id="pinWeightResult"
                class="text-3xl font-black mt-2">
                1,275 lbs
              </div>
            </div>

            <div class="glass rounded-2xl p-5">
              <div class="text-slate-400 text-sm uppercase">Compatible Vehicles</div>

              <div
                id="vehicleCount"
                class="text-3xl font-black mt-2">
                0
              </div>
            </div>
          </div>

          <!-- RESULTS GRID -->
          <div
            id="resultsGrid"
            class="grid md:grid-cols-2 gap-6"></div>
        </div>
      </div>
    </section>

    <!-- VEHICLE EXPLORER -->
    <section
      id="explorer"
      class="max-w-7xl mx-auto px-6 pb-24">
      <h2 class="text-4xl font-black mb-8">Vehicle Explorer</h2>

      <div class="flex flex-wrap gap-3 mb-8">
        <button
          onclick="setTab('all')"
          class="tab-btn tab-active px-5 py-3 rounded-xl glass">
          All
        </button>

        <button
          onclick="setTab('f150')"
          class="tab-btn px-5 py-3 rounded-xl glass">
          F-150
        </button>

        <button
          onclick="setTab('superduty')"
          class="tab-btn px-5 py-3 rounded-xl glass">
          Super Duty
        </button>

        <button
          onclick="setTab('suv')"
          class="tab-btn px-5 py-3 rounded-xl glass">
          SUVs
        </button>
      </div>

      <div
        id="explorerGrid"
        class="grid md:grid-cols-3 gap-6"></div>
    </section>

    <script>
      const vehicles = [
        {
          model: "F-150 XLT",
          category: "f150",
          engine: "3.5L EcoBoost V6",
          fuel: "gas",
          tow: 13500,
          payload: 2440,
          gcwr: 19400,
          drivetrain: "4x4",
          axle: "3.55",
          package: "Tow/Haul + Max Tow",
          image: "https://www.ford.com/cmslibs/content/dam/brand_ford/en_us/brand/trucks/f150/2026/collections/dm/26_FRD_F15_60710.tif/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg",
        },

        {
          model: "F-150 Hybrid Platinum",
          category: "f150",
          engine: "3.5L PowerBoost Hybrid",
          fuel: "hybrid",
          tow: 11600,
          payload: 1740,
          gcwr: 18400,
          drivetrain: "4x4",
          axle: "3.73",
          package: "Tow/Haul + Max Tow",
          image: "https://www.ford.com/cmslibs/content/dam/brand_ford/en_us/brand/trucks/f150/2026/collections/dm/26_FRD_F15_60710.tif/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg",
        },

        {
          model: "F-250 Super Duty",
          category: "superduty",
          engine: "6.7L Power Stroke Diesel",
          fuel: "diesel",
          tow: 22000,
          payload: 6952,
          gcwr: 30000,
          drivetrain: "4x4",
          axle: "3.55",
          package: "High-Capacity Axle Upgrade",
          image: "https://www.ford.com/cmslibs/content/dam/brand_ford/en_us/brand/trucks/super-duty/2026/collections/dm/26_FRD_SDE_60933.tif/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg",
        },

        {
          model: "F-250 7.3L Gas",
          category: "superduty",
          engine: "7.3L V8",
          fuel: "gas",
          tow: 18200,
          payload: 7635,
          gcwr: 26000,
          drivetrain: "4x4",
          axle: "4.30",
          package: "Tow Package",
          image: "https://www.ford.com/cmslibs/content/dam/brand_ford/en_us/brand/trucks/super-duty/2026/collections/dm/26_FRD_SDE_60933.tif/_jcr_content/renditions/cq5dam.web.1280.1280.jpeg",
        },

        {
          model: "Expedition",
          category: "suv",
          engine: "3.5L EcoBoost",
          fuel: "gas",
          tow: 9600,
          payload: 1700,
          gcwr: 15000,
          drivetrain: "4x4",
          axle: "3.73",
          package: "Heavy Duty Tow",
          image: "https://www.ford.com/is/image/content/dam/vdm_ford/live/en_us/ford/nameplate/expedition/2025/collections/dm/24_FRD_EPD_56096.tif?croppathe=1_3x2&wid=900",
        },
      ];

      function scrollToConfigurator() {
        document.getElementById("configurator").scrollIntoView({ behavior: "smooth" });
      }

      function scrollToExplorer() {
        document.getElementById("explorer").scrollIntoView({ behavior: "smooth" });
      }

      function calculateTowMatch() {
        const trailerWeight = parseInt(document.getElementById("trailerWeight").value);

        const trailerType = document.getElementById("trailerType").value;

        const terrain = document.getElementById("terrain").value;

        const fuelFilter = document.getElementById("fuelFilter").value;

        const tongueWeight = Math.round(trailerWeight * 0.1);

        const pinWeight = Math.round(trailerWeight * 0.15);

        document.getElementById("tongueWeightResult").innerText = `${tongueWeight.toLocaleString()} lbs`;

        document.getElementById("pinWeightResult").innerText = `${pinWeight.toLocaleString()} lbs`;

        let filtered = vehicles.filter((v) => {
          const towThreshold = terrain === "mountain" ? trailerWeight * 1.25 : terrain === "mixed" ? trailerWeight * 1.1 : trailerWeight;

          const passesTow = v.tow >= towThreshold;

          const passesFuel = fuelFilter === "all" || v.fuel === fuelFilter;

          return passesTow && passesFuel;
        });

        renderResults(filtered, trailerWeight);
      }

      function renderResults(filtered, trailerWeight) {
        const grid = document.getElementById("resultsGrid");

        document.getElementById("vehicleCount").innerText = filtered.length;

        grid.innerHTML = "";

        filtered.forEach((vehicle) => {
          const ratio = trailerWeight / vehicle.tow;

          let status = "";
          let label = "";

          if (ratio <= 0.7) {
            status = "excellent";
            label = "Excellent Match";
          } else if (ratio <= 0.9) {
            status = "warning";
            label = "Near Capacity";
          } else {
            status = "bad";
            label = "Not Ideal";
          }

          grid.innerHTML += `
          <div class="vehicle-card glass rounded-3xl overflow-hidden border border-white/10">

            <img
              src="${vehicle.image}"
              class="h-56 w-full object-cover"
            />

            <div class="p-6">

              <div class="flex justify-between items-start mb-4">
                <div>
                  <h3 class="text-2xl font-black">
                    ${vehicle.model}
                  </h3>

                  <div class="text-slate-400 mt-1">
                    ${vehicle.engine}
                  </div>
                </div>

                <div class="${status} px-3 py-2 rounded-xl text-sm font-bold">
                  ${label}
                </div>
              </div>

              <div class="grid grid-cols-2 gap-4 mt-6">

                <div class="glass rounded-xl p-4">
                  <div class="text-xs uppercase text-slate-400">
                    Max Tow
                  </div>

                  <div class="text-2xl font-black mt-1">
                    ${vehicle.tow.toLocaleString()}
                  </div>
                </div>

                <div class="glass rounded-xl p-4">
                  <div class="text-xs uppercase text-slate-400">
                    Payload
                  </div>

                  <div class="text-2xl font-black mt-1">
                    ${vehicle.payload.toLocaleString()}
                  </div>
                </div>

                <div class="glass rounded-xl p-4">
                  <div class="text-xs uppercase text-slate-400">
                    GCWR
                  </div>

                  <div class="text-xl font-black mt-1">
                    ${vehicle.gcwr.toLocaleString()}
                  </div>
                </div>

                <div class="glass rounded-xl p-4">
                  <div class="text-xs uppercase text-slate-400">
                    Axle Ratio
                  </div>

                  <div class="text-xl font-black mt-1">
                    ${vehicle.axle}
                  </div>
                </div>

              </div>

              <div class="mt-6 p-4 rounded-2xl bg-blue-600/20 border border-blue-500/30">

                <div class="text-sm uppercase text-blue-300 tracking-wide">
                  Required Package
                </div>

                <div class="font-bold mt-1">
                  ${vehicle.package}
                </div>

              </div>

            </div>

          </div>
        `;
        });
      }

      function renderExplorer(tab = "all") {
        const explorer = document.getElementById("explorerGrid");

        explorer.innerHTML = "";

        let list = tab === "all" ? vehicles : vehicles.filter((v) => v.category === tab);

        list.forEach((vehicle) => {
          explorer.innerHTML += `
          <div class="glass rounded-3xl overflow-hidden">

            <img
              src="${vehicle.image}"
              class="h-52 w-full object-cover"
            />

            <div class="p-5">

              <h3 class="text-2xl font-black">
                ${vehicle.model}
              </h3>

              <div class="text-slate-400 mt-2">
                ${vehicle.engine}
              </div>

              <div class="mt-6 space-y-3">

                <div class="flex justify-between">
                  <span class="text-slate-400">
                    Max Tow
                  </span>

                  <span class="font-bold">
                    ${vehicle.tow.toLocaleString()} lbs
                  </span>
                </div>

                <div class="flex justify-between">
                  <span class="text-slate-400">
                    Payload
                  </span>

                  <span class="font-bold">
                    ${vehicle.payload.toLocaleString()} lbs
                  </span>
                </div>

                <div class="flex justify-between">
                  <span class="text-slate-400">
                    Drivetrain
                  </span>

                  <span class="font-bold">
                    ${vehicle.drivetrain}
                  </span>
                </div>

                <div class="flex justify-between">
                  <span class="text-slate-400">
                    Axle Ratio
                  </span>

                  <span class="font-bold">
                    ${vehicle.axle}
                  </span>
                </div>

              </div>

            </div>

          </div>
        `;
        });
      }

      function setTab(tab) {
        document.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.remove("tab-active"));

        event.target.classList.add("tab-active");

        renderExplorer(tab);
      }

      calculateTowMatch();
      renderExplorer();
    </script>
  </body>
</html>
